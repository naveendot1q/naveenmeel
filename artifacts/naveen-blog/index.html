    <link rel="icon" type="image/jpeg" href="/naveen.jpg" id="favicon" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      /* Hide Replit platform badge */
      [data-testid="replit-badge"],
      .replit-badge, #replit-badge,
      a[href*="replit.com/badge"],
      img[src*="replit.com/badge"] {
        display: none !important;
        visibility: hidden !important;
        pointer-events: none !important;
      }
    </style>
    <script>
      function makeCircularFavicon() {
        var img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = function() {
          var size = 64;
          var canvas = document.createElement('canvas');
          canvas.width = size; canvas.height = size;
          var ctx = canvas.getContext('2d');
          ctx.beginPath();
          ctx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2);
          ctx.closePath();
          ctx.clip();
          ctx.drawImage(img, 0, 0, size, size);
          var link = document.getElementById('favicon') || document.createElement('link');
          link.id = 'favicon';
          link.rel = 'icon';
          link.type = 'image/png';
          link.href = canvas.toDataURL('image/png');
          if (!document.getElementById('favicon')) document.head.appendChild(link);
        };
        img.src = '/naveen.jpg?' + Date.now();
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', makeCircularFavicon);
      } else {
        makeCircularFavicon();
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
