kind = "web"
previewPath = "/"
title = "Naveen Meel — Portfolio & Blog"
version = "1.0.0"
id = "artifacts/naveen-blog"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20645

[services.development]
run = "pnpm --filter @workspace/naveen-blog run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/naveen-blog", "run", "build" ]
publicDir = "artifacts/naveen-blog/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20645"
BASE_PATH = "/"
